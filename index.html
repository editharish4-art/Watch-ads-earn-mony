<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Multi-Color Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { display: flex; height: 100vh; background: #f4f7f6; overflow-x: hidden; }

        /* --- MODERN SIDEBAR --- */
        #sidebar {
            width: 280px; 
            background: rgba(15, 15, 15, 0.98); 
            backdrop-filter: blur(15px);
            color: white; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: fixed; height: 100%; left: -280px; z-index: 1000;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }
        #sidebar.active { left: 0; }
        
        #sidebar h2 { padding: 30px 20px; text-align: center; font-size: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); color: #3498db; }
        #sidebar ul { list-style: none; padding: 20px 15px; }
        #sidebar ul li { margin-bottom: 15px; }

        /* Button Colors */
        .btn-yt { background: #ff0000 !important; color: white !important; }
        .btn-fb { background: #1877f2 !important; color: white !important; }
        .btn-web { background: #00b894 !important; color: white !important; }
        .btn-tt { background: #000000 !important; color: white !important; border: 1px solid #ff0050; }
        .btn-ads { background: #f1c40f !important; color: #000 !important; }

        #sidebar ul li a { 
            padding: 14px 20px; text-decoration: none; display: flex; align-items: center; 
            border-radius: 12px; transition: 0.3s; font-size: 15px; font-weight: bold;
        }

        /* --- MAIN CONTENT --- */
        #main-content { flex: 1; width: 100%; transition: 0.3s; }
        .header { 
            background: #fff; padding: 15px 25px; display: flex; align-items: center; 
            box-shadow: 0 2px 15px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 999; 
        }
        .menu-btn { font-size: 26px; cursor: pointer; color: #1a252f; z-index: 1001; }

        .content-area { padding: 25px; max-width: 1100px; margin: 0 auto; }

        /* Gallery */
        .thumb-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin-top: 20px; }
        .thumb-card { background: white; border-radius: 15px; overflow: hidden; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .thumb-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .video-info { padding: 15px; display: flex; gap: 12px; }
        .channel-icon { width: 35px; height: 35px; background: #ddd; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #333; }

        /* --- MODAL --- */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: #000; }
        .modal-content { background-color: #0f0f0f; margin: auto; width: 100%; max-width: 600px; height: 100vh; color: white; position: relative; overflow-y: auto; }
        .close-modal-btn { position: absolute; top: 10px; right: 20px; font-size: 30px; color: white; z-index: 2010; cursor: pointer; background: rgba(0,0,0,0.6); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        .youtube-video-wrapper { width: 100%; position: sticky; top: 0; z-index: 2005; padding-top: 56.25%; background: #000; }
        .youtube-video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .player-meta { padding: 15px; border-bottom: 1px solid #222; }
        .landscape-btn { background: #3498db; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }

        .suggested-item { display: flex; gap: 12px; padding: 12px; cursor: pointer; }
        .suggested-item img { width: 120px; aspect-ratio: 16/9; border-radius: 8px; object-fit: cover; }
    </style>
</head>
<body>

    <nav id="sidebar">
        <h2>स्मार्ट मेनु</h2>
        <ul>
            <li><a href="index.html" class="btn-yt">📺 YouTube</a></li>
            <li><a href="facebook.html" class="btn-fb">fb Facebook</a></li>
            <li><a href="website.html" class="btn-web">🌐 Website</a></li>
            <li><a href="tiktok.html" class="btn-tt">🎵 TikTok</a></li>
            <li><a href="watch-ads.html" class="btn-ads">💰 Watch Ads</a></li>
        </ul>
    </nav>

    <div id="main-content">
        <div class="header">
            <span class="menu-btn" onclick="toggleSidebar()">☰</span>
            <h3 style="margin-left: 15px; color: #1a252f;">Smart Dashboard</h3>
        </div>

        <div class="content-area">
            <div id="youtube-section">
                <h2 style="margin-bottom: 20px;">Home - Trending Videos</h2>
                <div class="thumb-gallery" id="videoGallery"></div>
            </div>
        </div>
    </div>

    <div id="videoModal" class="modal">
        <div class="modal-content" id="modalScroll">
            <span class="close-modal-btn" onclick="closeModal()">&times;</span>
            <div class="youtube-video-wrapper" id="playerWrapper">
                <iframe id="modalPlayer" src="" allow="autoplay; fullscreen" allowfullscreen></iframe>
            </div>
            <div class="player-meta">
                <h3 id="m-title">Title Loading...</h3>
                <p id="m-stats" style="color: #aaa; font-size: 13px; margin-top: 5px;"></p>
                <button class="landscape-btn" onclick="makeLandscape()">🔄 Full Screen</button>
            </div>
            <div style="padding: 15px; font-weight: bold;">थप भिडियोहरू</div>
            <div id="modalSuggested"></div>
        </div>
    </div>

    <script>
        const sidebar = document.getElementById('sidebar');
        const modal = document.getElementById('videoModal');
        const player = document.getElementById('modalPlayer');

        // मेनु खोल्ने र बन्द गर्ने
        function toggleSidebar() {
            sidebar.classList.toggle('active');
        }

        // भिडियोको डाटा
        const videos = [
            { id: 'dQw4w9WgXcQ', title: 'Nepali Billionaire Drama Full Episode', channel: 'Dabang', views: '204k' },
            { id: 'L_jWHffIx5E', title: 'Smart Tips 2024 for Life Improvement', channel: 'Nepal Tech', views: '1.2M' },
            { id: 'aqz-KE-bpKQ', title: 'Comedy Moments with Best Friends', channel: 'Funny Hub', views: '500k' },
            { id: '3JZ_D3ELwOQ', title: 'How to Earn Money Online - Guide', channel: 'Earning Guru', views: '80k' }
        ];

        // ग्यालेरी लोड गर्ने
        const gallery = document.getElementById('videoGallery');
        videos.forEach(v => {
            gallery.innerHTML += `
                <div class="thumb-card" onclick="openModal('${v.id}', '${v.title}', '${v.views}')">
                    <img src="https://img.youtube.com/vi/${v.id}/maxresdefault.jpg">
                    <div class="video-info">
                        <div class="channel-icon">${v.channel[0]}</div>
                        <div class="info-text">
                            <h4>${v.title}</h4>
                            <p>${v.channel} • ${v.views}</p>
                        </div>
                    </div>
                </div>`;
        });

        function openModal(id, title, stats) {
            modal.style.display = "block";
            player.src = `https://www.youtube.com/embed/${id}?autoplay=1&rel=0`;
            document.getElementById('m-title').innerText = title;
            document.getElementById('m-stats').innerText = stats + " views";
            document.body.style.overflow = "hidden";
            renderSuggested();
        }

        function closeModal() {
            modal.style.display = "none";
            player.src = "";
            document.body.style.overflow = "auto";
        }

        function renderSuggested() {
            const suggestList = document.getElementById('modalSuggested');
            suggestList.innerHTML = "";
            videos.forEach(sv => {
                suggestList.innerHTML += `
                    <div class="suggested-item" onclick="changeVideo('${sv.id}', '${sv.title}', '${sv.views}')">
                        <img src="https://img.youtube.com/vi/${sv.id}/mqdefault.jpg">
                        <div class="suggested-info">
                            <h5 style="font-size:14px;">${sv.title}</h5>
                            <p style="font-size:12px; color:#aaa;">${sv.channel}</p>
                        </div>
                    </div>`;
            });
        }

        function changeVideo(id, title, stats) {
            player.src = `https://www.youtube.com/embed/${id}?autoplay=1`;
            document.getElementById('m-title').innerText = title;
            document.getElementById('m-stats').innerText = stats + " views";
        }

        function makeLandscape() {
            const pWrap = document.getElementById('playerWrapper');
            if (pWrap.requestFullscreen) pWrap.requestFullscreen();
            else if (pWrap.webkitRequestFullscreen) pWrap.webkitRequestFullscreen();
            
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(() => {});
            }
        }
    </script>
</body>
</html>
