<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Dashboard - Firebase Connected</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2c3e50; --gold: #f1c40f; --success: #27ae60; --danger: #e74c3c; --blue: #3498db; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { display: flex; height: 100vh; background: #f4f7f6; overflow-x: hidden; padding-bottom: 90px; }

        /* --- SIDEBAR --- */
        #sidebar {
            width: 280px; 
            background: rgba(15, 15, 15, 0.98); 
            backdrop-filter: blur(15px);
            color: white; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: fixed; height: 100%; left: -280px; z-index: 1000;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }
        #sidebar.active { left: 0; }
        
        .sidebar-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar-header h2 { font-size: 20px; color: #3498db; }
        .close-sidebar { font-size: 30px; cursor: pointer; color: white; transition: 0.3s; }

        #sidebar ul { list-style: none; padding: 20px 15px; }
        #sidebar ul li { margin-bottom: 15px; }
        #sidebar ul li a { padding: 14px 20px; text-decoration: none; display: flex; align-items: center; border-radius: 12px; transition: 0.3s; font-size: 15px; font-weight: bold; }

        .btn-yt { background: #ff0000 !important; color: white !important; }
        .btn-fb { background: #1877f2 !important; color: white !important; }
        .btn-web { background: #00b894 !important; color: white !important; }
        .btn-tt { background: #000000 !important; color: white !important; border: 1px solid #ff0050; }
        .btn-ads { background: #f1c40f !important; color: #000 !important; }

        /* --- MAIN CONTENT --- */
        #main-content { flex: 1; width: 100%; transition: 0.3s; }
        .header { background: #fff; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 15px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 999; }
        
        .user-balance { background: #fff9e6; border: 1px solid #f1c40f; padding: 6px 15px; border-radius: 50px; display: flex; align-items: center; gap: 8px; font-weight: bold; color: #d6a000; }
        .coin-icon { background: #f1c40f; width: 20px; height: 20px; border-radius: 50%; display: inline-block; text-align: center; line-height: 20px; color: white; font-size: 12px; }

        .menu-btn { font-size: 26px; cursor: pointer; color: #1a252f; }
        .content-area { padding: 20px; max-width: 1100px; margin: 0 auto; }

        /* Gallery */
        .thumb-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 15px; }
        .thumb-card { background: white; border-radius: 15px; overflow: hidden; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s; }
        .thumb-card:active { transform: scale(0.97); }
        .thumb-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .video-info { padding: 12px; display: flex; gap: 10px; }
        .channel-icon { width: 35px; height: 35px; background: #eee; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #333; }
        .info-text h4 { font-size: 0.95rem; color: #222; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .info-text p { font-size: 0.8rem; color: #777; }

        /* --- PROFESSIONAL NAVIGATION --- */
        .bottom-nav { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 380px; background: var(--primary); display: flex; justify-content: space-around; padding: 8px; border-radius: 18px; box-shadow: 0 8px 20px rgba(0,0,0,0.25); z-index: 1000; }
        .nav-item { text-align: center; color: rgba(255,255,255,0.5); text-decoration: none; padding: 8px 15px; border-radius: 12px; transition: 0.3s; display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .nav-item i { font-size: 1.1rem; }
        .nav-item span { font-size: 0.65rem; font-weight: 600; }
        .nav-item.active { color: var(--white); background: rgba(255,255,255,0.12); }

        /* --- MODAL --- */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); backdrop-filter: blur(5px); }
        .modal-content { background-color: #0f0f0f; margin: auto; width: 100%; max-width: 600px; height: 100vh; color: white; position: relative; overflow-y: auto; }
        .close-modal-btn { position: absolute; top: 10px; right: 20px; font-size: 25px; color: white; z-index: 2010; cursor: pointer; background: rgba(0,0,0,0.6); width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .youtube-video-wrapper { width: 100%; position: sticky; top: 0; z-index: 2005; padding-top: 56.25%; background: #000; }
        .youtube-video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <nav id="sidebar">
        <div class="sidebar-header">
            <h2>स्मार्ट मेनु</h2>
            <span class="close-sidebar" onclick="toggleSidebar()">&times;</span>
        </div>
        <ul>
            <li><a href="index.html" class="btn-yt">📺 YouTube</a></li>
            <li><a href="facebook.html" class="btn-fb">fb Facebook</a></li>
            <li><a href="website.html" class="btn-web">🌐 Website</a></li>
            <li><a href="tiktok.html" class="btn-tt">🎵 TikTok</a></li>
            <li><a href="watch-ads.html" class="btn-ads">💰 Watch Ads</a></li>
        </ul>
    </nav>

    <div id="main-content">
        <div class="header">
            <div class="header-left" style="display: flex; align-items: center;">
                <span class="menu-btn" onclick="toggleSidebar()">☰</span>
                <h3 style="margin-left: 15px; color: #1a252f; font-size: 1.1rem;">Smart Dashboard</h3>
            </div>
            <div class="user-balance">
                <span class="coin-icon">₨</span>
                <span id="displayBalance">0.00</span>
            </div>
        </div>

        <div class="content-area">
            <h3 style="margin-bottom: 15px; color: #333;">Trending Videos</h3>
            <div class="thumb-gallery" id="videoGallery"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="index.html" class="nav-item active">
            <i class="fas fa-house-chimney"></i>
            <span>Home</span>
        </a>
        <a href="profile.html" class="nav-item">
            <i class="fas fa-user-gear"></i>
            <span>Profile</span>
        </a>
    </div>

    <div id="videoModal" class="modal">
        <div class="modal-content">
            <span class="close-modal-btn" onclick="closeModal()">&times;</span>
            <div class="youtube-video-wrapper">
                <iframe id="modalPlayer" src="" allow="autoplay; fullscreen" allowfullscreen></iframe>
            </div>
            <div style="padding: 20px;">
                <h3 id="m-title">Loading...</h3>
                <p id="m-stats" style="color: #aaa; font-size: 13px; margin-top: 8px;"></p>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBiAxlvsjw5If-i9pjGYvhIiM9wgIIukII",
            authDomain: "task-apps-5ebdc.firebaseapp.com",
            databaseURL: "https://task-apps-5ebdc-default-rtdb.firebaseio.com",
            projectId: "task-apps-5ebdc",
            storageBucket: "task-apps-5ebdc.firebasestorage.app",
            messagingSenderId: "1011417159330",
            appId: "1:1011417159330:web:976cd4e433f480f0f469fb"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        // Login भएको युजरको फोन नम्बर यहाँ राखिन्छ
        const currentUser = localStorage.getItem('currentUser') || "test_user_001";

        function syncBalance() {
            db.ref('users/' + currentUser + '/balance').on('value', (snapshot) => {
                const balance = snapshot.val() || 0;
                document.getElementById('displayBalance').innerText = parseFloat(balance).toFixed(2);
            });
        }

        const sidebar = document.getElementById('sidebar');
        function toggleSidebar() { sidebar.classList.toggle('active'); }

        const videos = [
            { id: 'dQw4w9WgXcQ', title: 'Nepali Billionaire Drama Full Episode', channel: 'Dabang', views: '204k' },
            { id: 'L_jWHffIx5E', title: 'Smart Tips 2024 for Life Improvement', channel: 'Nepal Tech', views: '1.2M' },
            { id: 'aqz-KE-bpKQ', title: 'Comedy Moments with Best Friends', channel: 'Funny Hub', views: '500k' }
        ];

        const gallery = document.getElementById('videoGallery');
        videos.forEach(v => {
            gallery.innerHTML += `
                <div class="thumb-card" onclick="openModal('${v.id}', '${v.title.replace(/'/g, "\\'")}', '${v.views}')">
                    <img src="https://img.youtube.com/vi/${v.id}/maxresdefault.jpg">
                    <div class="video-info">
                        <div class="channel-icon">${v.channel[0]}</div>
                        <div class="info-text"><h4>${v.title}</h4><p>${v.channel} • ${v.views} views</p></div>
                    </div>
                </div>`;
        });

        function openModal(id, title, stats) {
            document.getElementById('videoModal').style.display = "block";
            document.getElementById('modalPlayer').src = `https://www.youtube.com/embed/${id}?autoplay=1`;
            document.getElementById('m-title').innerText = title;
            document.getElementById('m-stats').innerText = stats + " views";
        }

        function closeModal() {
            document.getElementById('videoModal').style.display = "none";
            document.getElementById('modalPlayer').src = "";
        }

        window.onload = syncBalance;
    </script>
</body>
</html>
