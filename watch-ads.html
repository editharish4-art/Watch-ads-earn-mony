<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sukumaya TV - Task Zone</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #0f0f0f; color: white; padding: 15px; text-align: center; }

        .balance-card {
            background: linear-gradient(135deg, #f1c40f, #f39c12);
            color: #000; padding: 20px; border-radius: 15px; margin-bottom: 25px;
            position: sticky; top: 10px; z-index: 100; box-shadow: 0 8px 15px rgba(0,0,0,0.5);
        }
        .amount { font-size: 32px; font-weight: 900; }

        .task-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding-bottom: 30px;
        }

        .task-box {
            background: #1a1a1a;
            border: 2px solid #333;
            padding: 25px 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }

        .task-box:active { transform: scale(0.95); }
        .task-box.completed { pointer-events: none; border-color: #2ecc71; opacity: 0.5; }
        
        .task-box h3 { font-size: 16px; color: #f1c40f; }
        .task-box p { font-size: 12px; color: #2ecc71; font-weight: bold; }

        .done-label {
            position: absolute; inset: 0; background: rgba(0,0,0,0.8);
            display: flex; align-items: center; justify-content: center;
            color: #2ecc71; font-weight: bold; border-radius: 12px;
        }
    </style>
</head>
<body>

    <div class="balance-card">
        <p>तपाईँको कुल ब्यालेन्स</p>
        <div class="amount">रू <span id="balance">0.00</span></div>
    </div>

    <div class="task-grid" id="taskGrid"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBiAxlvsjw5If-i9pjGYvhIiM9wgIIukII",
            authDomain: "task-apps-5ebdc.firebaseapp.com",
            databaseURL: "https://task-apps-5ebdc-default-rtdb.firebaseio.com",
            projectId: "task-apps-5ebdc",
            storageBucket: "task-apps-5ebdc.firebasestorage.app",
            messagingSenderId: "1011417159330",
            appId: "1:1011417159330:web:976cd4e433f480f0f469fb"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const currentUser = localStorage.getItem('currentUser') || "user_" + Math.floor(Math.random() * 1000);

        let currentBoxId = null;

        // १०० बाकस बनाउने
        const grid = document.getElementById('taskGrid');
        for (let i = 1; i <= 100; i++) {
            const box = document.createElement('div');
            box.className = 'task-box';
            box.id = 'box-' + i;
            box.onclick = () => handleAdClick(i);
            box.innerHTML = `<h3>टास्क ${i}</h3><p>रू ०.१०</p>`;
            grid.appendChild(box);
        }

        function loadBalance() {
            db.ref('users/' + currentUser + '/balance').on('value', s => {
                document.getElementById('balance').innerText = (s.val() || 0).toFixed(2);
            });
        }

        function handleAdClick(id) {
            currentBoxId = id;

            // AppCreator24 विज्ञापन लोड हुन समय लाग्ने भएकोले 'Loading' देखाउने
            Swal.fire({
                title: 'विज्ञापन लोड हुँदैछ...',
                text: 'कृपया केही सेकेन्ड पर्खनुहोस्',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            if (typeof AppCreator24 !== 'undefined') {
                // विज्ञापन देखाउने प्रयास
                AppCreator24.showInterstitial();
                
                // विज्ञापन लोड हुन २-३ सेकेन्ड लाग्न सक्छ, त्यसैले अलि ढिलो रिवार्ड दिने
                setTimeout(() => {
                    Swal.close();
                    addMoney();
                }, 3000); 
            } else {
                Swal.fire("Error", "यो सिस्टम मोबाइल एपमा मात्र चल्छ!", "error");
            }
        }

        function addMoney() {
            db.ref('users/' + currentUser + '/balance').transaction(c => (c || 0) + 0.10)
            .then(() => {
                const target = document.getElementById('box-' + currentBoxId);
                if(target) {
                    target.classList.add('completed');
                    target.innerHTML += '<div class="done-label">सफल ✅</div>';
                }
                Swal.fire({
                    icon: 'success',
                    title: 'बधाई छ!',
                    text: 'तपाईँले रिवार्ड प्राप्त गर्नुभयो',
                    timer: 2000,
                    showConfirmButton: false
                });
            });
        }

        window.onload = loadBalance;
    </script>
</body>
</html>
