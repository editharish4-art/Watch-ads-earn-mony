<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100 Unity Ads System</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #0a0a0a; color: white; padding: 15px; text-align: center; }

        .balance-card {
            background: linear-gradient(135deg, #f1c40f, #f39c12);
            color: #000; padding: 20px; border-radius: 15px; margin-bottom: 25px;
            position: sticky; top: 10px; z-index: 100; box-shadow: 0 8px 15px rgba(0,0,0,0.5);
        }
        .amount { font-size: 30px; font-weight: 900; }

        .task-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding-bottom: 30px;
        }

        .task-box {
            background: #161616;
            border: 1px solid #333;
            padding: 25px 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }

        .task-box:active { transform: scale(0.96); background: #222; }
        .task-box.completed { pointer-events: none; border-color: #2ecc71; opacity: 0.6; }
        
        .task-box h3 { font-size: 15px; color: #f1c40f; margin-bottom: 5px; }
        .task-box p { font-size: 11px; color: #2ecc71; }

        .done-label {
            position: absolute; top: 5px; right: 5px;
            background: #2ecc71; color: white; font-size: 10px;
            padding: 2px 6px; border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="balance-card">
        <p>तपाईँको आम्दानी</p>
        <div class="amount">रू <span id="balance">0.00</span></div>
    </div>

    <div class="task-grid" id="taskGrid"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBiAxlvsjw5If-i9pjGYvhIiM9wgIIukII",
            authDomain: "task-apps-5ebdc.firebaseapp.com",
            databaseURL: "https://task-apps-5ebdc-default-rtdb.firebaseio.com",
            projectId: "task-apps-5ebdc",
            storageBucket: "task-apps-5ebdc.firebasestorage.app",
            messagingSenderId: "1011417159330",
            appId: "1:1011417159330:web:976cd4e433f480f0f469fb"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const currentUser = localStorage.getItem('currentUser') || "guest_user";

        let currentBoxId = null;

        // १०० बाकस बनाउने
        const grid = document.getElementById('taskGrid');
        for (let i = 1; i <= 100; i++) {
            const box = document.createElement('div');
            box.className = 'task-box';
            box.id = 'box-' + i;
            box.onclick = () => handleAdClick(i);
            box.innerHTML = `<h3>टास्क ${i}</h3><p>Reward: रू ०.१०</p>`;
            grid.appendChild(box);
        }

        function loadBalance() {
            db.ref('users/' + currentUser + '/balance').on('value', s => {
                document.getElementById('balance').innerText = (s.val() || 0).toFixed(2);
            });
        }

        // बाकस क्लिक गर्दा विज्ञापन चलाउने
        function handleAdClick(id) {
            currentBoxId = id;

            if (typeof AppCreator24 !== 'undefined') {
                // १. विज्ञापन देखाउने कमाण्ड
                AppCreator24.showInterstitial();
                
                // २. पैसा थप्ने लोजिक (यसलाई विज्ञापन सकिएपछि चल्ने गरी AppCreator24 को सेटिङमा पनि मिलाउन सकिन्छ)
                // तर तत्कालको लागि क्लिकमा रिवार्ड दिने गरी यहाँ राखिएको छ:
                addMoney();
            } else {
                Swal.fire("सूचना", "यो विज्ञापन केवल मोबाइल एप भित्र मात्र चल्छ।", "warning");
            }
        }

        function addMoney() {
            db.ref('users/' + currentUser + '/balance').transaction(c => (c || 0) + 0.10)
            .then(() => {
                if(currentBoxId) {
                    const target = document.getElementById('box-' + currentBoxId);
                    target.classList.add('completed');
                    target.innerHTML += '<div class="done-label">सफल ✅</div>';
                }
                Swal.fire({
                    icon: 'success',
                    title: 'बधाई छ!',
                    text: 'तपाईँले रू ०.१० पाउनुभयो',
                    timer: 1500,
                    showConfirmButton: false
                });
            });
        }

        window.onload = loadBalance;
    </script>
</body>
</html>
